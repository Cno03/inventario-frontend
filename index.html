<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">Sistema de Inventario</div>
    <div class="usuario">José Cano Flores</div>
</header>

<div class="container">

    <div class="card">

        <h2>Registrar Producto</h2>

        <form id="formProducto">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre del producto"
                required>

            <input
                type="number"
                id="precio"
                placeholder="Precio"
                required>

            <input
                type="number"
                id="existencia"
                placeholder="Existencia"
                required>

            <button type="submit">
                Guardar Producto
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Inventario Actual</h2>

        <table>

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Existencia</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tabla"></tbody>

        </table>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
